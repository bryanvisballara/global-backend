<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Global Imports | Mantenimientos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Syne:wght@500;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/app/styles.css" />
  </head>
  <body>
    <main class="dashboard-shell">
      <section class="dashboard-stage">
        <div class="dashboard-sheen"></div>
        <header class="page-topbar">
          <a class="secondary-button back-link" href="/app/admin.html">Volver al dashboard</a>
          <div class="page-topbar-actions">
            <div class="admin-badge">
              <span id="admin-name">Administrador</span>
              <strong id="admin-email">admin@globalimports.com</strong>
            </div>
            <button id="logout-button" class="secondary-button" type="button">Cerrar sesión</button>
          </div>
        </header>
        <section class="page-hero">
          <p class="section-tag">Módulo 5</p>
          <h1>Mantenimientos preventivos</h1>
          <p class="dashboard-lead">Da seguimiento al contacto, vencimiento y cierre de mantenimientos.</p>
        </section>
        <section class="module-grid single-module-grid">
          <article class="dashboard-card module-card module-card-wide">
            <div class="module-layout">
              <form id="maintenance-form" class="dashboard-form">
                <label><span>Registro de mantenimiento</span><select id="maintenance-id" name="maintenanceId" required></select></label>
                <label><span>Estado</span><select name="status"><option value="scheduled">Programado</option><option value="due">Vencido</option><option value="contacted">Contactado</option><option value="completed">Completado</option></select></label>
                <label><span>Notas de contacto</span><textarea name="contactNotes" rows="4" placeholder="Llamada, push, respuesta del cliente..."></textarea></label>
                <label class="checkbox-line dashboard-checkbox"><input name="markNotified" type="checkbox" /><span>Registrar notificación enviada ahora</span></label>
                <button class="primary-button" type="submit">Actualizar mantenimiento</button>
                <p id="maintenance-feedback" class="feedback" aria-live="polite"></p>
              </form>
              <div>
                <div class="module-metric-inline"><span>Total</span><strong id="maintenance-count">0</strong></div>
                <div id="maintenance-list" class="dashboard-list"></div>
              </div>
            </div>
          </article>
        </section>
      </section>
    </main>
    <script src="/app/admin-common.js"></script>
    <script src="/app/admin-maintenance.js"></script>
  </body>
</html>

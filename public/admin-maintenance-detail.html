<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Global Imports | Detalle mantenimiento</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Syne:wght@500;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/app/styles.css?v=20260412-maint4" />
  </head>
  <body>
    <main class="dashboard-shell">
      <section class="dashboard-stage">
        <div class="dashboard-sheen"></div>
        <header class="page-topbar">
          <a class="secondary-button back-link" href="/app/admin-maintenance.html">← Volver a mantenimientos</a>
          <div class="page-topbar-actions">
            <div class="admin-badge">
              <span id="admin-name">Administrador</span>
              <strong id="admin-email">admin@globalimports.com</strong>
            </div>
            <button id="logout-button" class="secondary-button" type="button" onclick="window.__performAdminLogout?.(); return false;">Cerrar sesión</button>
          </div>
        </header>
        <section class="page-hero">
          <h1 id="detail-title">Detalle de mantenimiento</h1>
          <p class="dashboard-lead" id="detail-subtitle">Gestiona el contacto y estado de cada cliente.</p>
        </section>
        <div class="maint-detail-section">
          <div class="maint-detail-toolbar">
            <a class="secondary-button" href="/app/admin-maintenance.html">← Volver a mantenimientos</a>
            <input
              type="search"
              id="maint-search"
              class="maint-detail-search"
              placeholder="Buscar por cliente, teléfono, placa, vehículo o ubicación..."
              autocomplete="off"
            />
            <select id="maint-city-filter" class="maint-detail-city-filter" aria-label="Filtrar por ciudad">
              <option value="">Todas las ciudades</option>
              <option value="Barranquilla">Barranquilla</option>
              <option value="Bogota">Bogota</option>
              <option value="Bucaramanga">Bucaramanga</option>
              <option value="Medellin">Medellin</option>
              <option value="Cali">Cali</option>
            </select>
            <span class="maint-detail-count-label">Mostrando <strong id="maint-total-count">0</strong> vehículos</span>
          </div>
          <div class="maint-detail-table-wrap">
            <table class="maint-table" id="maint-table">
              <thead id="maint-table-head">
                <tr></tr>
              </thead>
              <tbody id="maint-table-body"></tbody>
            </table>
          </div>
          <section class="maint-status-board" id="maint-status-board" aria-label="Resumen por estado">
            <article class="dashboard-card maint-status-card">
              <header><h3>Contactado</h3><strong id="status-count-contacted">0</strong></header>
              <div class="maint-vehicle-list maint-vehicle-list-compact" id="status-list-contacted"></div>
            </article>
            <article class="dashboard-card maint-status-card">
              <header><h3>Volver a contactarlo</h3><strong id="status-count-will_service">0</strong></header>
              <div class="maint-vehicle-list maint-vehicle-list-compact" id="status-list-will_service"></div>
            </article>
            <article class="dashboard-card maint-status-card">
              <header><h3>Serviciado en otro lado</h3><strong id="status-count-serviced_elsewhere">0</strong></header>
              <div class="maint-vehicle-list maint-vehicle-list-compact" id="status-list-serviced_elsewhere"></div>
            </article>
            <article class="dashboard-card maint-status-card">
              <header><h3>No interesado</h3><strong id="status-count-not_interested">0</strong></header>
              <div class="maint-vehicle-list maint-vehicle-list-compact" id="status-list-not_interested"></div>
            </article>
            <article class="dashboard-card maint-status-card">
              <header><h3>Cita agendada</h3><strong id="status-count-appointment_scheduled">0</strong></header>
              <div class="maint-vehicle-list maint-vehicle-list-compact" id="status-list-appointment_scheduled"></div>
            </article>
          </section>
          <p id="maint-detail-page-feedback" class="feedback" aria-live="polite" style="margin-top: 16px;"></p>
        </div>
      </section>
    </main>
    <script src="/app/admin-common.js?v=20260412-01"></script>
    <script src="/app/admin-maintenance-detail.js?v=20260412-04"></script>
  </body>
</html>

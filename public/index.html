<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Global Imports | Login</title>
    <meta
      name="description"
      content="Acceso mobile-first para Global Imports, con seguimiento de vehículos de alta gama y autenticación optimizada para WebView."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Syne:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/app/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="device-stage">
        <div class="device-sheen"></div>

        <div class="brand-zone">
          <img
            id="logo-symbol"
            class="brand-symbol"
            src="/app/logoblancoleon.png"
            alt="Logo blanco de león"
          />
          <img
            id="logo-wordmark"
            class="brand-wordmark"
            src="/app/textoblancoglobal.png"
            alt="Texto blanco Global"
          />
          <p class="brand-fallback" id="brand-fallback">GLOBAL IMPORTS</p>
        </div>

        <section class="story-panel">
          
        </section>

        <section class="auth-panel">
          <div class="auth-copy">
            <h2 id="form-title">Ingresa a tu cuenta</h2>
            <p id="form-subtitle">
              Accede con tu correo y contraseña para continuar con tu proceso dentro de Global Imports.
            </p>
          </div>

          <form id="login-form" class="login-form">
            <label id="name-field" class="auth-optional-field" hidden>
              <span>Nombre completo</span>
              <input
                id="name"
                name="name"
                type="text"
                autocomplete="name"
                placeholder="Tu nombre"
              />
            </label>

            <label id="phone-field" class="auth-optional-field" hidden>
              <span>Teléfono</span>
              <input
                id="phone"
                name="phone"
                type="tel"
                autocomplete="tel"
                placeholder="Ej: +57 300 123 4567"
              />
            </label>

            <label>
              <span>Correo</span>
              <input
                id="email"
                name="email"
                type="email"
                autocomplete="email"
                placeholder="correo@globalimports.com"
                required
              />
            </label>

            <label>
              <span>Contraseña</span>
              <div class="password-field">
                <input
                  id="password"
                  name="password"
                  type="password"
                  autocomplete="current-password"
                  placeholder="Tu clave de acceso"
                  required
                />
                <button
                  id="toggle-password"
                  class="password-toggle"
                  type="button"
                  aria-label="Mostrar contraseña"
                  aria-pressed="false"
                  title="Mostrar contraseña"
                >
                  <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path d="M12 5C6.8 5 2.4 8.1 1 12c1.4 3.9 5.8 7 11 7s9.6-3.1 11-7c-1.4-3.9-5.8-7-11-7Zm0 11.2A4.2 4.2 0 1 1 12 7.8a4.2 4.2 0 0 1 0 8.4Zm0-6.6a2.4 2.4 0 1 0 0 4.8 2.4 2.4 0 0 0 0-4.8Z"/>
                  </svg>
                </button>
              </div>
            </label>

            <div class="utility-row">
              <label class="checkbox-line">
                <input type="checkbox" id="remember" />
                <span>Mantener acceso</span>
              </label>
              <button class="link-button" type="button">¿Olvidaste tu contraseña?</button>
            </div>

            <button id="submit-button" class="primary-button" type="submit">
              Ingresar
            </button>

            <p id="feedback-message" class="feedback" aria-live="polite"></p>

            <p class="signup-prompt">
              ¿Aún no tienes cuenta?
              <button class="signup-link" type="button">Regístrate ahora</button>
            </p>

          </form>
        </section>
      </section>
    </main>

    <script src="/app/app-client.js?v=20260412-01"></script>
  </body>
</html>

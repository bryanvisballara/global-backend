<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Global Imports | Tracking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Syne:wght@500;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/app/styles.css" />
  </head>
  <body>
    <main class="dashboard-shell">
      <section class="dashboard-stage">
        <div class="dashboard-sheen"></div>
        <header class="page-topbar">
          <a class="secondary-button back-link" href="/app/admin.html">Volver al dashboard</a>
          <div class="page-topbar-actions">
            <div class="admin-badge">
              <span id="admin-name">Administrador</span>
              <strong id="admin-email">admin@globalimports.com</strong>
            </div>
            <button id="logout-button" class="secondary-button" type="button">Cerrar sesión</button>
          </div>
        </header>
        <section class="page-hero">
          <p class="section-tag">Módulo 4</p>
          <h1>Seguimiento de pedidos</h1>
          <p class="dashboard-lead">Actualiza los siete pasos del proceso de importación.</p>
        </section>
        <section class="module-grid single-module-grid">
          <article class="dashboard-card module-card module-card-wide">
            <div class="module-layout">
              <form id="tracking-form" class="dashboard-form">
                <label><span>Pedido</span><select id="tracking-order-id" name="orderId" required></select></label>
                <div class="form-row two-up">
                  <label><span>Paso</span><select id="tracking-step-key" name="stepKey" required></select></label>
                  <label><span>Estado</span><select name="status"><option value="pending">Pendiente</option><option value="active">Activo</option><option value="completed">Completado</option></select></label>
                </div>
                <label><span>Notas del paso</span><textarea name="notes" rows="4" placeholder="Qué ocurrió en esta etapa"></textarea></label>
                <label><span>Fotos o videos del paso</span><textarea name="mediaUrls" rows="3" placeholder="Una URL por línea"></textarea></label>
                <button class="primary-button" type="submit">Actualizar seguimiento</button>
                <p id="tracking-feedback" class="feedback" aria-live="polite"></p>
              </form>
              <div id="tracking-preview" class="tracking-preview"></div>
            </div>
          </article>
        </section>
      </section>
    </main>
    <script src="/app/admin-common.js"></script>
    <script src="/app/admin-tracking.js"></script>
  </body>
</html>

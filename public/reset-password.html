<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Global Imports | Restablecer contraseña</title>
    <meta
      name="description"
      content="Restablece tu contraseña de forma segura para continuar tu proceso dentro de Global Imports."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Syne:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/app/styles.css?v=20260413-login03" />
  </head>
  <body>
    <main class="app-shell reset-page-shell">
      <section class="device-stage">
        <div class="device-sheen"></div>

        <div class="brand-zone">
          <img class="brand-symbol" src="/app/logoblancoleon.png" alt="Logo blanco de león" />
          <img class="brand-wordmark" src="/app/textoblancoglobal.png" alt="Texto blanco Global" />
        </div>

        <section class="auth-panel reset-password-panel">
          <div class="auth-copy">
            <h2>Define tu nueva contraseña</h2>
            <p>
              Protege tu acceso con una nueva clave. Escríbela dos veces para confirmar el cambio.
            </p>
            <p class="reset-password-note" id="reset-password-token-state"></p>
          </div>

          <form id="reset-password-form" class="login-form">
            <label>
              <span>Nueva contraseña</span>
              <input
                id="reset-password"
                name="password"
                type="password"
                autocomplete="new-password"
                placeholder="Mínimo 6 caracteres"
                required
              />
            </label>

            <label>
              <span>Confirmar contraseña</span>
              <input
                id="reset-password-confirm"
                name="confirmPassword"
                type="password"
                autocomplete="new-password"
                placeholder="Escríbela nuevamente"
                required
              />
            </label>

            <button id="reset-password-submit" class="primary-button" type="submit">
              Guardar nueva contraseña
            </button>

            <p id="reset-password-feedback" class="feedback" aria-live="polite"></p>

            <p class="signup-prompt">
              <a class="signup-link" href="/app/index.html">Volver al acceso</a>
            </p>
          </form>
        </section>
      </section>
    </main>

    <script src="/app/reset-password.js?v=20260413-01"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Global Imports | Usuarios</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Syne:wght@500;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css?v=20260430-adminlight29" />
    <link rel="stylesheet" href="/admin-mobile-fix.css?v=20260514-ipadsidebar12" />
  </head>
  <body class="admin-app-view">
    <main class="dashboard-shell">
      <section class="dashboard-stage">
        <div class="dashboard-sheen"></div>
        <header class="page-topbar">
          <a class="secondary-button back-link" href="/app/admin.html">Volver al dashboard</a>
          <div class="page-topbar-actions">
            <div class="admin-badge">
              <span id="admin-name">Administrador</span>
              <strong id="admin-email">admin@globalimports.com</strong>
            </div>
            <button id="logout-button" class="secondary-button" type="button" onclick="window.__performAdminLogout?.(); return false;">Cerrar sesión</button>
          </div>
        </header>
        <section class="page-hero">
          <h1>Usuarios</h1>
          <p class="dashboard-lead">Consulta las personas registradas en la app y sus datos principales.</p>
        </section>
        <section class="module-grid single-module-grid">
          <article class="dashboard-card module-card module-card-wide">
            <div class="clients-dashboard-stack">
              <section class="clients-stats-grid" aria-label="Resumen usuarios">
                <article class="metric-card client-stat-card">
                  <span>Total usuarios</span>
                  <strong id="users-total-count">0</strong>
                </article>
              </section>

              <section class="dashboard-card clients-filter-card" aria-label="Filtros de usuarios">
                <div class="clients-filter-grid">
                  <label>
                    <span>Búsqueda</span>
                    <input id="users-search-input" type="text" placeholder="Nombre, correo o teléfono..." />
                  </label>
                  <div class="clients-filter-actions">
                    <button id="users-clear-button" class="secondary-button" type="button">Limpiar</button>
                    <button id="users-filter-button" class="secondary-button" type="button">Filtrar</button>
                  </div>
                </div>
              </section>

              <section class="dashboard-card tracking-table-card clients-results-card" aria-label="Listado de usuarios">
                <div class="card-heading">
                  <h2>Usuarios registrados</h2>
                  <span id="users-results-count" class="section-tag">0 usuario(s)</span>
                </div>
                <div class="tracking-table-wrap">
                  <table class="tracking-data-table">
                    <thead>
                      <tr>
                        <th>Fecha de creación</th>
                        <th>Nombre</th>
                        <th>Correo</th>
                        <th>Teléfono</th>
                      </tr>
                    </thead>
                    <tbody id="users-results-body">
                      <tr>
                        <td colspan="4"><div class="empty-state">Cargando usuarios...</div></td>
                      </tr>
                    </tbody>
                  </table>
                </div>
                <p id="users-feedback" class="feedback" aria-live="polite"></p>
              </section>
            </div>
          </article>
        </section>
      </section>
    </main>

    <script src="/admin-common.js?v=20260514-adminroutes08"></script>
    <script src="/admin-users.js?v=20260509-users02"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Global Imports | Publicaciones</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Syne:wght@500;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/app/styles.css" />
  </head>
  <body>
    <main class="dashboard-shell">
      <section class="dashboard-stage">
        <div class="dashboard-sheen"></div>
        <header class="page-topbar">
          <a class="secondary-button back-link" href="/app/admin.html">Volver al dashboard</a>
          <div class="page-topbar-actions">
            <div class="admin-badge">
              <span id="admin-name">Administrador</span>
              <strong id="admin-email">admin@globalimports.com</strong>
            </div>
            <button id="logout-button" class="secondary-button" type="button">Cerrar sesión</button>
          </div>
        </header>
        <section class="page-hero">
          <p class="section-tag">Módulo 1</p>
          <h1>Publicaciones</h1>
          <p class="dashboard-lead">Gestiona el feed tipo red social que verá el cliente.</p>
        </section>
        <section class="module-grid single-module-grid">
          <article class="dashboard-card module-card module-card-wide">
            <div class="module-layout">
              <form id="post-form" class="dashboard-form">
                <label><span>Título</span><input name="title" type="text" placeholder="Nuevo embarque disponible" required /></label>
                <label><span>Texto</span><textarea name="body" rows="4" placeholder="Describe la publicación para el cliente" required></textarea></label>
                <div class="form-row two-up">
                  <label><span>Formato</span><select name="format"><option value="carousel">Carrusel</option><option value="video">Video</option></select></label>
                  <label><span>Estado</span><select name="status"><option value="published">Publicada</option><option value="draft">Borrador</option></select></label>
                </div>
                <label><span>Archivos multimedia</span><input name="mediaFiles" type="file" accept="image/*,video/*" multiple /></label>
                <label><span>URLs de respaldo</span><textarea name="mediaUrls" rows="4" placeholder="Opcional. Una URL por línea si no subes archivos."></textarea></label>
                <button class="primary-button" type="submit">Crear publicación</button>
                <p id="post-feedback" class="feedback" aria-live="polite"></p>
              </form>
              <div>
                <div class="module-metric-inline"><span>Total</span><strong id="posts-count">0</strong></div>
                <div id="posts-list" class="dashboard-list"></div>
              </div>
            </div>
          </article>
        </section>
      </section>
    </main>
    <script src="/app/admin-common.js"></script>
    <script src="/app/admin-posts.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Global Imports | Pedidos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Syne:wght@500;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css?v=20260414-scale75" />
    <link rel="stylesheet" href="/admin-mobile-fix.css?v=20260414-adminmobile01" />
    <style>
      .global-loading-overlay {
        display: none !important;
      }
    </style>
  </head>
  <body class="admin-app-view">
    <main class="dashboard-shell">
      <section class="dashboard-stage">
        <div class="dashboard-sheen"></div>
        <header class="page-topbar">
          <a class="secondary-button back-link" href="/admin.html">Volver al dashboard</a>
          <div class="page-topbar-actions">
            <div class="admin-badge">
              <span id="admin-name">Administrador</span>
              <strong id="admin-email">admin@globalimports.com</strong>
            </div>
            <button id="logout-button" class="secondary-button" type="button" onclick="window.__performAdminLogout?.(); return false;">Cerrar sesión</button>
          </div>
        </header>
        <section class="page-hero">
          <h1>Creación de pedido</h1>
          <p class="dashboard-lead">Registra carros importados con tracking único y material visual del pedido.</p>
        </section>
        <section class="module-grid single-module-grid">
          <article class="dashboard-card module-card module-card-wide">
            <div class="module-layout">
              <form id="order-form" class="dashboard-form" enctype="multipart/form-data" onsubmit="event.preventDefault(); return window.__submitAdminOrder?.(event) ?? false;">
                <div class="form-row two-up">
                  <label><span>Marca</span><input name="brand" type="text" placeholder="Toyota" required /></label>
                  <label><span>Modelo</span><input name="model" type="text" placeholder="4Runner" required /></label>
                </div>
                <div class="form-row two-up">
                  <label><span>Versión</span><input name="version" type="text" placeholder="SR5, Limited, AMG, GT Line..." required /></label>
                  <label><span>Año</span><input name="year" type="number" min="1900" placeholder="2024" required /></label>
                </div>
                <div class="form-row two-up">
                  <label>
                    <span>Tracking</span>
                    <div class="tracking-field-stack">
                      <input id="order-tracking-number" name="trackingNumber" type="text" placeholder="GI-000123" readonly required />
                      <button id="generate-tracking-button" class="link-button tracking-generate-button" type="button" onclick="window.__fillRandomTracking?.(); return false;">Regenerar tracking aleatoriamente</button>
                    </div>
                  </label>
                  <label><span>VIN</span><input name="vin" type="text" placeholder="Ingresa el VIN (opcional)" /></label>
                </div>
                <div class="form-row three-up">
                  <label>
                    <span>Destino</span>
                    <select name="destination" required>
                      <option value="">Selecciona destino</option>
                      <option value="Puerto Santa Marta">Puerto Santa Marta</option>
                      <option value="Puerto Cartagena">Puerto Cartagena</option>
                      <option value="Puerto Barranquilla">Puerto Barranquilla</option>
                    </select>
                  </label>
                  <label>
                    <span>Color exterior</span>
                    <select name="exteriorColor" required>
                      <option value="">Selecciona color exterior</option>
                      <option value="Black">Black</option>
                      <option value="Blue">Blue</option>
                      <option value="Brown">Brown</option>
                      <option value="Gray">Gray</option>
                      <option value="Incognito (gris nardo)">Incognito (gris nardo)</option>
                      <option value="Mudbath">Mudbath</option>
                      <option value="Other">Other</option>
                      <option value="Red">Red</option>
                      <option value="Silver">Silver</option>
                      <option value="White">White</option>
                      <option value="Yellow">Yellow</option>
                    </select>
                  </label>
                  <label>
                    <span>Color interior</span>
                    <select name="interiorColor" required>
                      <option value="">Selecciona color interior</option>
                      <option value="Black">Black</option>
                      <option value="Blue">Blue</option>
                      <option value="Brown">Brown</option>
                      <option value="Gray">Gray</option>
                      <option value="Incognito (gris nardo)">Incognito (gris nardo)</option>
                      <option value="Mudbath">Mudbath</option>
                      <option value="Other">Other</option>
                      <option value="Red">Red</option>
                      <option value="Silver">Silver</option>
                      <option value="White">White</option>
                      <option value="Yellow">Yellow</option>
                    </select>
                  </label>
                </div>
                <label>
                  <span>Cliente</span>
                  <select id="order-client-select" name="clientId" required>
                    <option value="">Cargando clientes...</option>
                  </select>
                  <small id="order-client-summary" class="field-helper">Selecciona uno de los clientes ya creados.</small>
                </label>
                <label>
                  <span>Fotos o videos</span>
                  <input id="order-media-files" name="mediaFiles" type="file" accept="image/*,video/*" multiple />
                  <small id="order-media-summary" class="field-helper"></small>
                </label>
                <button class="primary-button" type="submit">Crear pedido</button>
                <p id="order-feedback" class="feedback" aria-live="polite"></p>
              </form>
            </div>
          </article>
        </section>
      </section>
    </main>
    <div id="order-success-modal" class="client-modal" hidden>
      <div class="client-modal-overlay" data-close-modal="order-success-modal" onclick="window.__closeOrderSuccessModal?.()"></div>
      <section class="client-modal-card admin-modal-card admin-success-card" role="dialog" aria-modal="true" aria-labelledby="order-success-title">
        <div class="admin-brand-mark success">
          <img src="/logoblancoleon.png" alt="Global Imports" />
          <span>Global Imports</span>
        </div>
        <header class="client-modal-header admin-success-header">
          <div>
            <h2 id="order-success-title">Pedido creado</h2>
            <p id="order-success-description" class="modal-copy">El pedido se guardó correctamente.</p>
          </div>
        </header>
        <div id="order-success-meta" class="modal-meta"></div>
        <div class="modal-actions-row single-action">
          <button id="order-success-close" class="primary-button" type="button" onclick="window.__closeOrderSuccessModal?.()">Entendido</button>
        </div>
      </section>
    </div>
    <script src="/admin-common.js?v=20260409-05"></script>
    <script>
      (() => {
        const currentUrl = new URL(window.location.href);

        if (currentUrl.search) {
          window.history.replaceState({}, document.title, currentUrl.pathname);
        }

        const clearPageLoadingState = () => {
          document.querySelectorAll('.global-loading-overlay').forEach((overlay) => {
            overlay.hidden = true;
          });
          document.body.classList.remove('loading-active');
        };

        document.addEventListener("DOMContentLoaded", clearPageLoadingState);
        window.addEventListener("pageshow", clearPageLoadingState);
        window.addEventListener("load", clearPageLoadingState);
      })();

      document.addEventListener("DOMContentLoaded", () => {
        document.querySelectorAll(".global-loading-overlay").forEach((overlay) => {
          overlay.hidden = true;
        });
        document.body.classList.remove("loading-active");
      });
    </script>
    <script src="/admin-orders.js?v=20260409-35"></script>
  </body>
</html>
